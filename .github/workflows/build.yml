name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache Odin
        uses: actions/cache@v6
        with:
          path: tools/odin
          key: odin-windows-dev-2026-07a

      - name: Download Odin and build
        shell: pwsh
        run: scripts/build.ps1

      - name: Package
        shell: pwsh
        run: scripts/package.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/dbsl-windows-x64.zip
          archive: false

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache Odin
        uses: actions/cache@v6
        with:
          path: tools/odin
          key: odin-linux-dev-2026-07a

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libx11-dev libcurl4-openssl-dev

      - name: Download Odin and build
        run: scripts/build.sh

      - name: Package
        run: scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/dbsl-linux-x64.tar.xz
          archive: false

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache Odin
        uses: actions/cache@v6
        with:
          path: tools/odin
          key: odin-macos-dev-2026-07a

      - name: Download Odin and build
        run: scripts/build.sh

      - name: Package
        run: scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/dbsl-macos-arm.zip
          archive: false
